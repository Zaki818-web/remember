<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Poppins',sans-serif;
  background:black;
  color:white;
}

/* ===== GATE ===== */
#gate{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle,#111,#000);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  text-align:center;
}

#gate h1{
  font-size:22px;
  margin-bottom:8px;
}

#gate p{
  font-size:14px;
  opacity:0.8;
  margin-bottom:18px;
}

#gate button{
  padding:12px 25px;
  border:none;
  border-radius:12px;
  background:#ff4b5c;
  color:white;
  font-size:15px;
  cursor:pointer;
  box-shadow:0 0 25px #ff4b5c;
  transition:0.3s;
}

/* ===== BACKGROUND CINEMATIC HD LOOK ===== */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:center/cover no-repeat;
  filter:brightness(0.7) contrast(1.2) saturate(1.25);
  transform:scale(1.08);
  transition:1s ease;
}

/* vignette + film look */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  pointer-events:none;
  background:radial-gradient(circle,transparent 55%,rgba(0,0,0,0.75));
}

/* slight film grain */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  pointer-events:none;
  opacity:0.05;
  background-image:url("https://grainy-gradients.vercel.app/noise.svg");
}

/* ===== SCENE ===== */
.scene{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  width:90%;
  z-index:2;
}

/* FOTO (HD LOOK ENHANCER) */
#photo{
  width:270px;
  height:360px;
  object-fit:cover;
  border-radius:20px;

  /* 🔥 cinematic sharp look */
  filter:contrast(1.15) saturate(1.2) brightness(1.05);
  box-shadow:0 0 60px rgba(0,0,0,0.6);

  opacity:0;
  transform:scale(1.08);
  transition:1.2s ease;
}

/* TITLE */
.title{
  font-family:'Great Vibes',cursive;
  font-size:44px;
  margin-bottom:8px;
  text-shadow:0 0 15px rgba(255,255,255,0.6);
}

/* TEXT (RAPI + CINEMATIC SUBTITLE STYLE) */
#text{
  margin-top:8px;
  font-size:15px;
  max-width:340px;
  margin-left:auto;
  margin-right:auto;
  line-height:1.35;
  letter-spacing:0.2px;
  opacity:0.95;
}

/* HEART */
.heart{
  position:absolute;
  color:red;
  animation:float 6s linear forwards;
}

@keyframes float{
  0%{transform:translateY(100vh);opacity:1;}
  100%{transform:translateY(-10vh);opacity:0;}
}

/* fade effect */
.fade{
  opacity:0 !important;
  transform:scale(1.15) !important;
}
</style>
</head>

<body>

<!-- GATE -->
<div id="gate">
  <h1>Jangan di skip ya ❤️</h1>
  <p>Klik untuk mulai cerita ini</p>
  <button onclick="start()">KLIK 💖</button>
</div>

<!-- AUDIO -->
<audio id="music" loop preload="auto">
  <source src="Audio.mp3" type="audio/mpeg">
</audio>

<div class="bg" id="bg"></div>

<div class="scene">
  <div class="title">Selamat Ulang Tahun 🎉</div>
  <img id="photo">
  <div id="text"></div>
</div>

<script>

/* ===== START ===== */
function start(){
  document.getElementById("gate").style.display="none";

  let music=document.getElementById("music");
  music.volume=0.8;
  music.play().catch(()=>{});

  story();
  hearts();
}

/* ===== STORY MODE CINEMATIC ===== */
let scenes=[
{img:"foto1.jpg.jpeg",text:"Hari ini bukan hari biasa… ini tentang kamu 💖"},
{img:"foto2.jpg.jpeg",text:"Aku masih ingat semua awalnya…"},
{img:"foto3.jpg.jpeg",text:"Dan sejak itu… semuanya berubah ✨"},
{img:"foto4.jpg.jpeg",text:"Kamu jadi alasan aku tersenyum 💕"},
{img:"foto5.jpg.jpeg",text:"Aku selalu berharap kamu bahagia 💘"},
{img:"foto6.jpg.jpeg",text:"Terima kasih sudah ada ❤️"},
{img:"foto7.jpg.jpeg",text:"Aku bangga sama kamu 💖"},
{img:"foto8.jpg.jpeg",text:"Kalau dunia berat… aku di sini 💔"},
{img:"foto9.jpg.jpeg",text:"Dan sekarang…"},
{img:"foto10.jpg.jpeg",text:"Aku cuma mau bilang…"},
{img:"foto11.jpg.jpeg",text:"Aku sayang kamu ❤️"},
{img:"foto12.jpg.jpeg",text:"Selalu."},
{img:"foto13.jpg.jpeg",text:"Dan akan terus begitu."},
{img:"foto14.jpg.jpeg",text:"Selamat ulang tahun 💖"},
{img:"foto15.jpg.jpeg",text:"THE END… tapi rasa ini nggak pernah selesai"}
];

let i=0;

function story(){

  let photo=document.getElementById("photo");
  let text=document.getElementById("text");
  let bg=document.getElementById("bg");

  function next(){

    if(i>=scenes.length){
      text.innerHTML="❤️ Terima kasih sudah melihat semuanya";
      return;
    }

    let s=scenes[i];

    photo.classList.add("fade");

    setTimeout(()=>{
      photo.src=s.img;
      bg.style.backgroundImage="url("+s.img+")";
      photo.classList.remove("fade");

      typeText(s.text,text);
      i++;

      setTimeout(next,3400);

    },500);
  }

  next();
}

/* ===== TYPE EFFECT (CINEMATIC SUBTITLE) ===== */
function typeText(msg,el){
  el.innerHTML="";
  let i=0;

  function run(){
    if(i<msg.length){
      el.innerHTML+=msg.charAt(i);
      i++;
      setTimeout(run,28);
    }
  }

  run();
}

/* ===== HEARTS ===== */
function hearts(){
  for(let j=0;j<90;j++){
    setTimeout(()=>{
      let h=document.createElement("div");
      h.className="heart";
      h.innerHTML="❤️";
      h.style.left=Math.random()*100+"vw";
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),6000);
    },j*100);
  }
}

</script>

</body>
</html>
