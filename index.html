<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Poppins',sans-serif;
  background:black;
  color:white;
}

/* ===== GATE ===== */
#gate{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  text-align:center;
}

#gate h1{
  font-size:22px;
  margin-bottom:10px;
}

#gate p{
  font-size:14px;
  opacity:0.8;
  margin-bottom:20px;
}

#gate button{
  padding:12px 25px;
  border:none;
  border-radius:12px;
  background:#ff4b5c;
  color:white;
  font-size:16px;
  cursor:pointer;
  box-shadow:0 0 20px #ff4b5c;
}

/* ===== BACKGROUND BLUR ===== */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:center/cover no-repeat;
  filter:blur(18px) brightness(0.6);
  transform:scale(1.1);
  transition:1s;
}

/* ===== CONTENT ===== */
.scene{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  width:90%;
  z-index:2;
}

/* FOTO */
#photo{
  width:270px;
  height:360px;
  object-fit:cover;
  border-radius:18px;
  box-shadow:0 0 50px rgba(0,0,0,0.6);
  opacity:0;
  transition:1s ease;
}

/* TITLE */
.title{
  font-family:'Great Vibes',cursive;
  font-size:42px;
  margin-bottom:8px;
}

/* TEXT */
#text{
  margin-top:10px;
  font-size:15px;
  max-width:340px;
  margin-left:auto;
  margin-right:auto;
  line-height:1.35;
}

/* HEART */
.heart{
  position:absolute;
  color:red;
  animation:float 6s linear forwards;
}

@keyframes float{
  0%{transform:translateY(100vh);opacity:1;}
  100%{transform:translateY(-10vh);opacity:0;}
}
</style>
</head>

<body>

<!-- ===== GATE ===== -->
<div id="gate">
  <h1>Jangan di skip ya ❤️</h1>
  <p>Klik untuk mulai cerita</p>
  <button onclick="start()">KLIK 💖</button>
</div>

<!-- 🔥 AUDIO FIX GITHUB (INI YANG SERING SALAH) -->
<audio id="music" loop preload="auto">
  <!-- 📌 WAJIB TARUH FILE DI ROOT FOLDER REPO -->
  <source src="./Audio.mp3" type="audio/mpeg">
</audio>

<!-- BACKGROUND -->
<div class="bg" id="bg"></div>

<!-- CONTENT -->
<div class="scene">
  <div class="title">Selamat Ulang Tahun 🎉</div>
  <img id="photo">
  <div id="text"></div>
</div>

<script>

/* ===== START ===== */
function start(){
  document.getElementById("gate").style.display="none";

  /* 🔥 AUDIO START (WAJIB DI KLIK USER) */
  let music=document.getElementById("music");
  music.volume=0.8;

  music.play().catch(err=>{
    console.log("Audio gagal autoplay, tapi sudah unlock klik user");
  });

  story();
  hearts();
}

/* ===== STORY ===== */
let scenes=[
{img:"foto1.jpg.jpeg",text:"Hari ini tentang kamu 💖"},
{img:"foto2.jpg.jpeg",text:"Aku masih ingat semuanya..."},
{img:"foto3.jpg.jpeg",text:"Dan sejak itu berubah ✨"},
{img:"foto4.jpg.jpeg",text:"Kamu alasan senyumku 💕"},
{img:"foto5.jpg.jpeg",text:"Aku ingin kamu bahagia 💘"},
{img:"foto6.jpg.jpeg",text:"Terima kasih ❤️"},
{img:"foto7.jpg.jpeg",text:"Aku bangga sama kamu 💖"},
{img:"foto8.jpg.jpeg",text:"Aku di sini kalau kamu jatuh 💔"},
{img:"foto9.jpg.jpeg",text:"Dan sekarang..."},
{img:"foto10.jpg.jpeg",text:"Aku mau bilang..."},
{img:"foto11.jpg.jpeg",text:"Aku sayang kamu ❤️"},
{img:"foto12.jpg.jpeg",text:"Selalu."},
{img:"foto13.jpg.jpeg",text:"Dan terus begitu."},
{img:"foto14.jpg.jpeg",text:"Selamat ulang tahun 💖"},
{img:"foto15.jpg.jpeg",text:"THE END ❤️"}
];

let i=0;

function story(){

  let photo=document.getElementById("photo");
  let text=document.getElementById("text");
  let bg=document.getElementById("bg");

  function next(){

    if(i>=scenes.length){
      text.innerHTML="❤️ Terima kasih sudah melihat semuanya";
      return;
    }

    let s=scenes[i];

    photo.style.opacity=0;

    setTimeout(()=>{
      photo.src=s.img;

      /* 🔥 BACKGROUND CHANGE */
      bg.style.backgroundImage="url("+s.img+")";

      photo.style.opacity=1;

      typeText(s.text,text);
      i++;

      setTimeout(next,3500);

    },500);
  }

  next();
}

/* ===== TYPE EFFECT ===== */
function typeText(msg,el){
  el.innerHTML="";
  let i=0;

  function run(){
    if(i<msg.length){
      el.innerHTML+=msg.charAt(i);
      i++;
      setTimeout(run,25);
    }
  }

  run();
}

/* ===== HEART ===== */
function hearts(){
  for(let j=0;j<80;j++){
    setTimeout(()=>{
      let h=document.createElement("div");
      h.className="heart";
      h.innerHTML="❤️";
      h.style.left=Math.random()*100+"vw";
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),6000);
    },j*120);
  }
}

</script>

</body>
</html>
