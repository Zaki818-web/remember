<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Poppins',sans-serif;
  background:black;
  color:white;
}

/* background cinematic */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url("foto1.jpg.jpeg") center/cover no-repeat;
  filter:blur(25px) brightness(0.5);
  transition:1s;
}

/* container center */
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:2;
}

/* foto utama */
#slide{
  width:260px;
  height:340px;
  object-fit:cover;
  border-radius:20px;
  box-shadow:0 0 40px rgba(255,255,255,0.6);
  transition:opacity 1s ease, transform 2s ease;
}

/* zoom effect */
.zoom{
  transform:scale(1.1);
}

/* title */
.title{
  font-family:'Great Vibes',cursive;
  font-size:40px;
  text-shadow:0 0 10px #fff,0 0 20px #ff4b5c;
  margin-bottom:10px;
}

/* typing text */
.text{
  font-size:17px;
  max-width:300px;
  margin:10px auto;
  min-height:60px;
}

/* hearts */
.heart{
  position:absolute;
  color:red;
  font-size:18px;
  animation:float 6s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);opacity:0;}
}
</style>
</head>

<body onclick="playMusic()">

<div class="bg" id="bg"></div>

<!-- AUDIO TANPA DOWNLOAD -->
<audio id="music" autoplay loop playsinline>
  <source src="https://cdn.pixabay.com/download/audio/2023/03/28/audio_5c9b5bb0e3.mp3">
</audio>

<div class="container">
  <div class="title">Selamat Ulang Tahun 🎉</div>

  <img id="slide" src="foto1.jpg.jpeg">

  <div class="text" id="typing"></div>
</div>

<script>

/* ================= FOTO SLIDE ================= */
let images = [
"foto1.jpg.jpeg","foto2.jpg.jpeg","foto3.jpg.jpeg","foto4.jpg.jpeg","foto5.jpg.jpeg",
"foto6.jpg.jpeg","foto7.jpg.jpeg","foto8.jpg.jpeg","foto9.jpg.jpeg","foto10.jpg.jpeg",
"foto11.jpg.jpeg","foto12.jpg.jpeg","foto13.jpg.jpeg","foto14.jpg.jpeg","foto15.jpg.jpeg"
];

let i = 0;

setInterval(()=>{
  i = (i+1) % images.length;

  let slide = document.getElementById("slide");

  slide.style.opacity = 0;

  setTimeout(()=>{
    slide.src = images[i];
    slide.style.opacity = 1;
    slide.classList.toggle("zoom");
  },400);

  document.getElementById("bg").style.backgroundImage = "url("+images[i]+")";

},3500);


/* ================= TYPING TEXT ================= */
let messages = [
"🎉 Selamat Ulang Tahun 🎉",
"Nazlah Sakinah A ❤️",
"Hari ini adalah hari spesial, karena kamu hadir di dunia ini 💕",
"Terima kasih sudah menjadi alasan aku tersenyum setiap hari ✨",
"Kamu adalah seseorang yang sangat berarti dalam hidupku 💖",
"Aku berharap kamu selalu sehat, bahagia, dan semua impianmu tercapai 💫",
"Aku akan selalu ada untukmu, dalam keadaan apapun 💘",
"Aku sayang kamu, hari ini, besok, dan selamanya ❤️"
];

let msgIndex = 0;
let charIndex = 0;

function typeText(){
  if(msgIndex < messages.length){
    let el = document.getElementById("typing");

    if(charIndex < messages[msgIndex].length){
      el.innerHTML += messages[msgIndex].charAt(charIndex);
      charIndex++;
      setTimeout(typeText,40);
    }else{
      setTimeout(()=>{
        el.innerHTML="";
        charIndex=0;
        msgIndex++;
        typeText();
      },2200);
    }
  }
}
typeText();


/* ================= AUDIO FIX ================= */
function playMusic(){
  let music = document.getElementById("music");
  music.play();
}


/* ================= HEART ================= */
for(let j=0;j<80;j++){
  setTimeout(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },j*120);
}

</script>

</body>
</html>
