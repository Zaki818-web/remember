<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cinematic For You 💖</title>

<!-- PREMIUM FONT -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f0f0f;
  font-family:'Poppins',sans-serif;
  overflow:hidden;
}

/* CINEMATIC FRAME */
.card{
  width:92%;
  max-width:420px;
  border-radius:18px;
  overflow:hidden;
  position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* START BUTTON */
button{
  position:absolute;
  z-index:10;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  padding:14px 20px;
  border:none;
  border-radius:12px;
  background:#ff4d6d;
  color:white;
  font-size:15px;
  cursor:pointer;
}

/* IMAGE */
img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;

  opacity:0;
  transform:scale(1.08);
  transition:opacity 1s ease, transform 2.5s ease;
}

.show{
  opacity:1 !important;
  transform:scale(1);
}

/* DARK OVERLAY CINEMATIC */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.5), transparent);
}
</style>
</head>

<body>

<div class="card">

  <button onclick="start()">▶ Play Moment</button>

  <img id="foto">
  <div class="overlay"></div>

</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

<script>

const images=[
"foto1","foto2","foto3","foto4","foto5",
"foto6","foto7","foto8","foto9","foto10",
"foto11","foto12","foto13","foto14","foto15"
];

let i=0;
let img=document.getElementById("foto");
let music=document.getElementById("music");

/* PRELOAD BIAR TIDAK GLITCH */
images.forEach(n=>{
  ["jpg","jpeg","JPG"].forEach(ext=>{
    let im=new Image();
    im.src=n+"."+ext;
  });
});

function start(){

  document.querySelector("button").style.display="none";

  music.play();

  show();

  setInterval(()=>{
    i++;
    if(i>=images.length) i=0;
    show();
  },4000); // cinematic timing (lebih pelan kayak video)
}

/* SHOW CINEMATIC */
function show(){
  img.classList.remove("show");

  setTimeout(()=>{
    load(images[i],0);
  },300);
}

/* AUTO DETECT JPG/JPEG */
function load(name,step){
  const ext=[".jpg",".jpeg",".JPG"];

  if(step>=ext.length) return;

  img.src=name+ext[step];

  img.onload=()=>{
    img.classList.add("show");
  }

  img.onerror=()=>{
    load(name,step+1);
  }
}

</script>

</body>
</html>
